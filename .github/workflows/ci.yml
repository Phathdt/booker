name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l . | grep -v vendor | grep -v gen/ || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - name: Generate protobuf
        run: buf dep update && buf generate
      - name: Build
        run: go build -o /dev/null .

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - name: Generate protobuf
        run: buf dep update && buf generate
      - name: Run unit tests
        run: go test ./modules/... -v -short -count=1

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - name: Generate protobuf
        run: buf dep update && buf generate
      - name: Run integration tests
        run: go test ./test/... -v -timeout 300s
