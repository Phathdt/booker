syntax = "proto3";

package user.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "booker/proto/user/v1/gen";

// AuthService — authentication and token operations
service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse) {
    option (google.api.http) = { post: "/api/v1/auth/register" body: "*" };
  }
  rpc Login(LoginRequest) returns (AuthResponse) {
    option (google.api.http) = { post: "/api/v1/auth/login" body: "*" };
  }
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPairResponse) {
    option (google.api.http) = { post: "/api/v1/auth/refresh" body: "*" };
  }
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/api/v1/auth/logout" body: "*" };
  }
  rpc GetMe(GetMeRequest) returns (User) {
    option (google.api.http) = { get: "/api/v1/auth/me" };
  }
  // Internal only — used by ForwardAuth
  rpc ValidateAccessToken(ValidateTokenRequest) returns (TokenClaims);
  rpc RevokeAllUserTokens(RevokeAllRequest) returns (google.protobuf.Empty);
}

// UserService — user management (admin/protected)
service UserService {
  rpc GetUser(GetUserByIDRequest) returns (User) {
    option (google.api.http) = { get: "/api/v1/users/{id}" };
  }
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = { get: "/api/v1/users" };
  }
}

// --- Common ---

message User {
  string id = 1;
  string email = 2;
  string role = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
}

// --- AuthService messages ---

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string user_id = 1;
}

message GetMeRequest {}

message ValidateTokenRequest {
  string token = 1;
}

message RevokeAllRequest {
  string user_id = 1;
}

message AuthResponse {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
  int32 expires_in = 4;
}

message TokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;
}

message TokenClaims {
  string user_id = 1;
  string email = 2;
  string role = 3;
  string jti = 4;
}

// --- UserService messages ---

message GetUserByIDRequest {
  string id = 1;
}

message ListUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  int64 total = 2;
}
