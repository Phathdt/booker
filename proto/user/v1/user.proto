syntax = "proto3";

package user.v1;

import "google/protobuf/empty.proto";

option go_package = "booker/proto/user/v1/gen";

// UserService — inter-service gRPC only
// REST endpoints handled by Fiber directly
service UserService {
  // Used by other services to get user info
  rpc GetUser(GetUserByIDRequest) returns (User);
  // Used by ForwardAuth / other services to validate JWT
  rpc ValidateAccessToken(ValidateTokenRequest) returns (TokenClaims);
  // Used by other services to revoke tokens (e.g. admin ban user)
  rpc RevokeAllUserTokens(RevokeAllRequest) returns (google.protobuf.Empty);
}

message User {
  string id = 1;
  string email = 2;
  string role = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
}

message GetUserByIDRequest {
  string id = 1;
}

message ValidateTokenRequest {
  string token = 1;
}

message RevokeAllRequest {
  string user_id = 1;
}

message TokenClaims {
  string user_id = 1;
  string email = 2;
  string role = 3;
  string jti = 4;
}
